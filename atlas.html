<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas — Artifice Ecosystem</title>
  <meta name="description" content="ATLAS [LOCATE] — A spatial index of venues, studios, and environments mapped to creative practice.">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <style>
    @font-face {
      font-family: 'Fragment Mono';
      font-style: normal; font-display: swap; font-weight: 400;
      src: url('https://cdn.jsdelivr.net/fontsource/fonts/fragment-mono@latest/latin-400-normal.woff2') format('woff2');
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #000;
      --surface: #0a0a0a;
      --border: #1a1a1a;
      --text: #fff;
      --text-2: #aaa;
      --text-3: #555;
      --accent: #c8ff00;
      --mono: 'Fragment Mono', ui-monospace, monospace;
      --sans: 'Helvetica Now Display', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 320px 1fr 380px;
      grid-template-rows: 56px 1fr;
      height: 100vh;
    }
    .layout.panel-closed { grid-template-columns: 320px 1fr 0px; }

    /* Header */
    .header {
      grid-column: 1 / -1;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-logo {
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
      text-decoration: none;
    }
    .header-logo:hover { color: var(--text-2); }
    .header-nav { display: flex; gap: 20px; align-items: center; }
    .header-nav a {
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-3);
      text-decoration: none;
      padding-bottom: 2px;
    }
    .header-nav a:hover { color: var(--text); }
    .header-nav a.active {
      color: var(--text);
      border-bottom: 1px solid var(--text);
    }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .header-count {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-3);
    }
    .header-nav-link {
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-3);
      text-decoration: none;
    }
    .header-nav-link:hover { color: var(--text); }

    /* Sidebar */
    .sidebar {
      overflow-y: auto;
      border-right: 1px solid var(--border);
      background: var(--bg);
    }
    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }
    .sidebar-title {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
    }

    /* Floating command bar (bottom) */
    .cmd-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 10px 10px 28px;
      width: min(660px, calc(100vw - 40px));
      background: rgba(10, 10, 10, 0.82);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 44px;
      box-shadow:
        0 4px 32px rgba(0, 0, 0, 0.5),
        0 0 24px rgba(255, 255, 255, 0.03),
        0 0 60px rgba(255, 255, 255, 0.02);
    }
    .cmd-search {
      flex: 1;
      min-width: 0;
      height: 42px;
      padding: 0 10px;
      font-family: var(--mono);
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: var(--text);
      background: transparent;
      border: none;
      outline: none;
    }
    .cmd-search::placeholder { color: rgba(255, 255, 255, 0.3); }
    .cmd-divider {
      width: 1px;
      height: 28px;
      background: rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }
    .cmd-submit-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--bg);
      background: var(--text);
      border: none;
      padding: 10px 20px;
      border-radius: 28px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .cmd-submit-btn:hover { background: var(--text-2); }
    .cmd-submit-btn svg { flex-shrink: 0; width: 10px; height: 10px; }

    .sidebar-filters {
      padding: 10px 20px;
      display: flex;
      gap: 6px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 45px;
      background: var(--bg);
      z-index: 10;
    }
    .filter-btn {
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-3);
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
    }
    .filter-btn:hover { color: var(--text-2); }
    .filter-btn.active {
      color: var(--text);
      border-color: var(--border);
      background: var(--surface);
    }

    .space-list { list-style: none; }
    .space-item {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .space-item:hover { background: var(--surface); }
    .space-item.active { background: rgba(255,255,255,0.04); border-left: 2px solid var(--accent); }
    .space-item-name {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 3px;
    }
    .space-item-location {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-3);
    }
    .space-item-mode {
      display: inline-block;
      margin-top: 4px;
      font-family: var(--mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 6px;
      border: 1px solid var(--border);
    }
    .space-item-mode.whitebox { color: var(--text-2); }
    .space-item-mode.blackbox { color: var(--text-3); }

    /* Map */
    .map-container {
      position: relative;
    }
    #map { width: 100%; height: 100%; }

    /* Leaflet overrides */
    .leaflet-container { background: #000; }
    .leaflet-control-zoom { border: 1px solid var(--border) !important; }
    .leaflet-control-zoom a {
      background: var(--bg) !important;
      color: var(--text-3) !important;
      border-color: var(--border) !important;
      width: 30px !important;
      height: 30px !important;
      line-height: 30px !important;
      font-size: 14px !important;
    }
    .leaflet-control-zoom a:hover {
      background: var(--surface) !important;
      color: var(--text) !important;
    }
    .leaflet-control-attribution { display: none; }

    .custom-marker {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: transform 0.15s;
    }
    .custom-marker:hover { transform: scale(1.15); }
    .custom-marker.active { transform: scale(1.25); }

    .marker-circle {
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 0 12px rgba(255, 255, 255, 0.1),
        0 0 24px rgba(255, 255, 255, 0.05),
        inset 0 0 8px rgba(255, 255, 255, 0.03);
    }
    .custom-marker:hover .marker-circle {
      box-shadow:
        0 0 16px rgba(255, 255, 255, 0.18),
        0 0 32px rgba(255, 255, 255, 0.08),
        inset 0 0 10px rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.12);
    }
    .custom-marker.active .marker-circle {
      box-shadow:
        0 0 20px rgba(255, 255, 255, 0.25),
        0 0 40px rgba(255, 255, 255, 0.1),
        inset 0 0 12px rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.16);
    }
    .marker-circle img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }
    .marker-label {
      font-family: var(--mono);
      font-size: 7px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      white-space: nowrap;
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .custom-marker:hover .marker-label { color: rgba(255, 255, 255, 0.7); }
    .custom-marker.active .marker-label { color: rgba(255, 255, 255, 0.85); }

    /* Desc Panel */
    .desc-panel {
      overflow-y: auto;
      border-left: 1px solid var(--border);
      background: var(--bg);
      transition: width 0.2s;
    }
    .panel-closed .desc-panel { display: none; }
    .desc-panel-empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    .desc-panel-empty-text {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
      text-align: center;
    }
    .desc-panel-header {
      padding: 24px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .desc-panel-close {
      padding: 4px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-3);
      font-family: var(--mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      flex-shrink: 0;
    }
    .desc-panel-close:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .desc-panel-mode {
      font-family: var(--mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
      margin-bottom: 8px;
    }
    .desc-panel-name {
      font-family: var(--sans);
      font-size: 22px;
      font-weight: 300;
      letter-spacing: -0.01em;
      color: var(--text);
      padding: 0 24px;
      margin-top: 4px;
    }
    .desc-panel-location {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-3);
      padding: 6px 24px 0;
    }
    .desc-panel-divider {
      margin: 20px 24px;
      border: none;
      border-top: 1px solid var(--border);
    }
    .desc-panel-section-label {
      font-family: var(--mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
      padding: 0 24px;
      margin-bottom: 8px;
    }
    .desc-panel-text {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 300;
      line-height: 1.6;
      color: var(--text-2);
      padding: 0 24px;
    }
    .desc-panel-meta {
      padding: 0 24px;
      margin-top: 16px;
    }
    .desc-panel-meta-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .desc-panel-meta-label {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-3);
    }
    .desc-panel-meta-value {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-2);
      text-align: right;
    }
    .desc-panel-link {
      display: inline-block;
      margin: 20px 24px;
      padding: 8px 16px;
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text);
      border: 1px solid var(--border);
      text-decoration: none;
    }
    .desc-panel-link:hover { background: var(--surface); border-color: rgba(255,255,255,0.15); }

    /* Responsive */
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: 56px 1fr; }
      .sidebar { display: none; }
      .desc-panel { display: none; }
    }
  </style>
</head>
<body>

<div class="layout panel-closed" id="layout">

  <header class="header">
    <div class="header-left">
      <a href="index.html" class="header-logo">ARTIFICE [ECOSYSTEM]</a>
    </div>
    <nav class="header-nav">
      <a href="#">Radar</a>
      <a href="#">Profiles</a>
      <a href="atlas.html" class="active">Atlas</a>
      <a href="index.html">Index</a>
    </nav>

      <span class="header-count" id="space-count"></span>
      <a href="about.html" class="header-nav-link">About</a>

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Atlas [Locate]</div>
    </div>

      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="WHITEBOX">Whitebox</button>
      <button class="filter-btn" data-filter="BLACKBOX">Blackbox</button>

  </aside>

  <div class="map-container">
    <div id="map"></div>
  </div>

  <div class="cmd-bar">
    <input type="search" class="cmd-search" id="search" placeholder="Search for a space ..." autocomplete="off">
    <div class="cmd-divider"></div>
    <button class="cmd-submit-btn" id="cmd-submit-btn">
      <svg viewBox="0 0 16 16" width="10" height="10" fill="currentColor"><path d="M8 1v6H2v2h6v6h2V9h6V7H10V1z"/></svg>
      Submit
    </button>
  </div>

  <aside class="desc-panel" id="desc-panel">
    <div class="desc-panel-empty" id="panel-empty">
      <div class="desc-panel-empty-text">Select a space<br>to view details</div>
    </div>
    <div id="panel-content" style="display:none"></div>
  </aside>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function () {
  const SPACES = [
    { id: 1, name: "Pioneer Works", location: "Red Hook, Brooklyn", borough: "Brooklyn", lat: 40.6785, lng: -74.0132, mode: "BLACKBOX", type: "Gallery / Residency", desc: "A multidisciplinary cultural center in a 25,000 sq ft industrial building. Exhibitions, residencies, performances, and science programs. One of the most significant independent art spaces in New York.", capacity: "500+", url: "https://pioneerworks.org" },
    { id: 2, name: "Soho20 Gallery", location: "Brooklyn", borough: "Brooklyn", lat: 40.6782, lng: -73.9922, mode: "WHITEBOX", type: "Gallery / Artist-Run", desc: "Founded in 1973 as a feminist cooperative gallery. One of the longest-running artist-run spaces in the country. Exhibitions, workshops, and community programming.", capacity: "50-80", url: "https://soho20gallery.com" },

    { id: 5, name: "A.I.R. Gallery", location: "Dumbo, Brooklyn", borough: "Brooklyn", lat: 40.7033, lng: -73.9880, mode: "WHITEBOX", type: "Gallery / Artist-Run", desc: "Founded in 1972. The first artist-run, not-for-profit gallery for women artists in the United States. Exhibitions, fellowships, and mentorship programs.", capacity: "60-100", url: "https://www.airgallery.org" },
    { id: 6, name: "UsagiNY / Gift Shopping Brooklyn", location: "Williamsburg, Brooklyn", borough: "Brooklyn", lat: 40.7100, lng: -73.9565, mode: "BLACKBOX", type: "Retail / Cultural", desc: "A curated retail and cultural space in Williamsburg. Merges commerce with exhibition, hosting rotating installations alongside independent design goods.", capacity: "30-40", url: "" },

    { id: 8, name: "Babycastles", location: "Manhattan", borough: "Manhattan", lat: 40.7505, lng: -73.9934, mode: "BLACKBOX", type: "Gallery / Arcade", desc: "A nonprofit collective and DIY gallery fostering and amplifying diverse voices in video game culture. Arcade cabinets, exhibitions, workshops, and performances.", capacity: "80-120", url: "https://babycastles.com" },
    { id: 9, name: "MURMRR | Gather", location: "Brooklyn", borough: "Brooklyn", lat: 40.6833, lng: -73.9775, mode: "BLACKBOX", type: "Performance / Venue", desc: "An intimate performance space inside a converted 1840s church in Boerum Hill. Music, film screenings, and cross-disciplinary programming.", capacity: "100-150", url: "https://murmrr.com" },

    { id: 11, name: "Wonderville", location: "Brooklyn", borough: "Brooklyn", lat: 40.6868, lng: -73.9777, mode: "BLACKBOX", type: "Bar / Arcade / Venue", desc: "An arcade bar and event space showcasing indie games alongside performances, screenings, and experimental programming. Community-owned cooperative.", capacity: "100-150", url: "https://www.wonderville.nyc" },

  let activeSpaceId = null;

  });

  }).addTo(map);

    var iconSrc = mode === 'WHITEBOX' ? 'whitebox-icon.png' : 'blackbox-icon.png';
    var label = name || mode;
    return L.divIcon({
      className: 'custom-marker' + (isActive ? ' active' : ''),
      html: '<div class="marker-circle"><img src="' + iconSrc + '" alt="' + mode + '"></div><span class="marker-label">' + label + '</span>',
      iconSize: [80, 72],
      iconAnchor: [40, 30]
    });
  }

  // Render space list
  function renderList() {
    const list = document.getElementById('space-list');
    const query = document.getElementById('search').value.toLowerCase();
    list.innerHTML = '';

    const filtered = SPACES.filter(function(s) {
      const matchesFilter = activeFilter === 'all' || s.mode === activeFilter;
      const matchesSearch = !query || s.name.toLowerCase().includes(query) || s.location.toLowerCase().includes(query) || s.borough.toLowerCase().includes(query);
      return matchesFilter && matchesSearch;
    });

    document.getElementById('space-count').textContent = filtered.length + ' space' + (filtered.length !== 1 ? 's' : '');

    filtered.forEach(function(s) {
      const li = document.createElement('li');
      li.className = 'space-item' + (s.id === activeSpaceId ? ' active' : '');
      li.innerHTML =
        '<div class="space-item-name">' + s.name + '</div>' +
        '<div class="space-item-location">' + s.location + '</div>' +
        '<span class="space-item-mode ' + s.mode.toLowerCase() + '">' + s.mode + '</span>';
      li.addEventListener('click', function() { selectSpace(s.id); });
      list.appendChild(li);
    });
  }

  // Render markers
  function renderMarkers() {
    Object.values(markers).forEach(function(m) { map.removeLayer(m); });
    markers = {};
    const query = document.getElementById('search').value.toLowerCase();

    SPACES.forEach(function(s) {
      const matchesFilter = activeFilter === 'all' || s.mode === activeFilter;
      const matchesSearch = !query || s.name.toLowerCase().includes(query) || s.location.toLowerCase().includes(query) || s.borough.toLowerCase().includes(query);
      if (!matchesFilter || !matchesSearch) return;

      const marker = L.marker([s.lat, s.lng], {
        icon: createIcon(s.id === activeSpaceId, s.mode, s.name)
      }).addTo(map);
      marker.on('click', function() { selectSpace(s.id); });
      marker._spaceMode = s.mode;
      marker._spaceName = s.name;
      markers[s.id] = marker;
    });
  }

  // Select space
  function selectSpace(id) {
    activeSpaceId = id;
    const s = SPACES.find(function(sp) { return sp.id === id; });
    if (!s) return;

    // Update layout
    document.getElementById('layout').classList.remove('panel-closed');

    // Update panel
    document.getElementById('panel-empty').style.display = 'none';
    const panel = document.getElementById('panel-content');
    panel.style.display = 'block';
    panel.innerHTML =
      '<div class="desc-panel-header">' +
        '<div class="desc-panel-mode">' + s.mode + '</div>' +
        '<button class="desc-panel-close" id="panel-close">Clear</button>' +
      '</div>' +
      '<div class="desc-panel-name">' + s.name + '</div>' +
      '<div class="desc-panel-location">' + s.location + '</div>' +
      '<hr class="desc-panel-divider">' +
      '<div class="desc-panel-section-label">Description</div>' +
      '<div class="desc-panel-text">' + s.desc + '</div>' +
      '<div class="desc-panel-meta">' +
        '<div class="desc-panel-meta-row"><span class="desc-panel-meta-label">Type</span><span class="desc-panel-meta-value">' + s.type + '</span></div>' +
        '<div class="desc-panel-meta-row"><span class="desc-panel-meta-label">Borough</span><span class="desc-panel-meta-value">' + s.borough + '</span></div>' +
        '<div class="desc-panel-meta-row"><span class="desc-panel-meta-label">Capacity</span><span class="desc-panel-meta-value">' + s.capacity + '</span></div>' +
        '<div class="desc-panel-meta-row"><span class="desc-panel-meta-label">Mode</span><span class="desc-panel-meta-value">' + s.mode + '</span></div>' +
      '</div>' +
      (s.url ? '<a href="' + s.url + '" target="_blank" rel="noopener" class="desc-panel-link">Visit &rarr;</a>' : '');

    document.getElementById('panel-close').addEventListener('click', closePanel);

    // Update map
    map.flyTo([s.lat, s.lng], 14, { duration: 0.5 });

    // Update markers
    Object.keys(markers).forEach(function(mid) {
      markers[mid].setIcon(createIcon(parseInt(mid) === id, markers[mid]._spaceMode, markers[mid]._spaceName));
    });

    // Update list
    renderList();
    setTimeout(function() { map.invalidateSize(); }, 250);
  }

  function closePanel() {
    activeSpaceId = null;
    document.getElementById('layout').classList.add('panel-closed');
    document.getElementById('panel-empty').style.display = 'flex';
    document.getElementById('panel-content').style.display = 'none';
    Object.keys(markers).forEach(function(mid) {
      markers[mid].setIcon(createIcon(false, markers[mid]._spaceMode, markers[mid]._spaceName));
    });
    renderList();
    setTimeout(function() { map.invalidateSize(); }, 250);
  }

  // Filters
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      activeFilter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      renderList();
      renderMarkers();
    });
  });

  // Search
  document.getElementById('search').addEventListener('input', function() {
    renderList();
    renderMarkers();
  });

  // Init
  renderList();
  renderMarkers();
})();
</script>

</body>
</html>
