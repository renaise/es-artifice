<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>[ECO SYSTEM] by Artifice</title>
  <meta name="description" content="The Artifact Index — a structured, relational dataset of creative process. Discover, connect, locate, archive.">
  <meta property="og:title" content="The Artifact Index — Artifice">
  <meta property="og:description" content="Discover, connect, locate, archive — connected through the work.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://index.artificenyc.org">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <meta property="og:image" content="https://index.artificenyc.org/og-image.png">
  <meta property="og:image:width" content="669">
  <meta property="og:image:height" content="609">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:image" content="https://index.artificenyc.org/og-image.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    @font-face {
      font-family: 'Helvetica Now Display';
      src: local('Helvetica Now Display'), local('HelveticaNowDisplay-Regular'),
           url('fonts/HelveticaNowDisplay-Regular.woff2') format('woff2');
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Helvetica Now Display';
      src: local('Helvetica Now Display Light'), local('HelveticaNowDisplay-Light'),
           url('fonts/HelveticaNowDisplay-Light.woff2') format('woff2');
      font-weight: 300; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Fragment Mono';
      font-style: normal; font-display: swap; font-weight: 400;
      src: url('https://cdn.jsdelivr.net/fontsource/fonts/fragment-mono@latest/latin-400-normal.woff2') format('woff2');
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000; --surface: #0a0a0a; --border: #1a1a1a;
      --text: #fff; --text-2: #aaa; --text-3: #555;
      --mono: 'Fragment Mono', ui-monospace, monospace;
      --sans: 'Helvetica Now Display', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      --wb: #8ac; --bb: #c8a;
    }

    body {
      font-family: var(--sans); background: var(--bg); color: var(--text);
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }

    /* ---- Header ---- */
    .header {
      position: sticky; top: 0; z-index: 50;
      height: 96px; padding: 0 24px;
      display: grid; grid-template-columns: 1fr auto 1fr;
      align-items: center;
      background: var(--bg); border-bottom: 1px solid var(--border);
    }
    .header-left {
      display: flex; align-items: center; gap: 16px;
    }
    .header-logo {
      font-family: var(--mono); font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text); text-decoration: none;
      display: flex; align-items: center; gap: 8px;
    }
    .header-logo:hover { color: var(--text-2); }
    .header-logo-img { height: 80px; width: auto; display: block; }
    .header-count {
      font-family: var(--mono); font-size: 9px;
      color: var(--text-3);
    }

    .header-nav {
      display: flex; align-items: center; gap: 0;
    }
    .header-tab {
      font-family: var(--mono); font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--text-3); text-decoration: none;
      padding: 15px 14px; border-bottom: 1px solid transparent;
      margin-bottom: -1px; transition: color 0.12s;
    }
    .header-tab:hover { color: var(--text-2); }
    .header-tab--active { color: var(--text); border-bottom-color: var(--text); }
    .header-tab--locked { cursor: default; opacity: 0.4; }
    .header-tab--locked:hover { color: var(--text-3); }
    .lock-icon { width: 9px; height: 9px; fill: currentColor; vertical-align: middle; margin-left: 2px; margin-top: -1px; }

    .header-right {
      display: flex; align-items: center; justify-content: flex-end; gap: 8px;
      min-width: 0; flex-shrink: 1;
    }
    .header-search {
      width: 140px; min-width: 0; flex-shrink: 1;
      height: 28px; padding: 0 10px;
      font-family: var(--mono); font-size: 10px;
      color: var(--text); background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.25); border-radius: 2px; outline: none;
    }
    .header-search::placeholder { color: rgba(255,255,255,0.5); }
    .header-search:focus { border-color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.12); }
    .header-cta {
      font-family: var(--mono); font-size: 9px;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--bg); background: var(--text);
      border: none; padding: 5px 10px; cursor: pointer;
      text-decoration: none; white-space: nowrap; flex-shrink: 0;
    }
    .header-cta:hover { background: var(--text-2); }

    /* ---- Atlas Map ---- */
    .atlas-map-section { padding: 0 24px 16px; }

    /* ---- Mode Toggle (sticky bottom bar) ---- */
    .mode-toggle-bar {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 100;
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px;
      background: rgba(10,10,10,0.75);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 40px;
      transition: opacity 0.2s;
    }
    .mode-toggle-bar[hidden] { display: none; }
    .mode-toggle-btn {
      background: none; border: 2px solid transparent; border-radius: 28px;
      padding: 6px 14px; cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: all 0.15s;
      opacity: 0.4;
    }
    .mode-toggle-btn:hover { opacity: 0.7; }
    .mode-toggle-btn--active { opacity: 1; border-color: rgba(255,255,255,0.3); }
    .mode-toggle-btn img { height: 22px; width: auto; }
    .mode-toggle-label {
      font-family: var(--mono); font-size: 9px;
      text-transform: uppercase; color: var(--text-2); letter-spacing: 0.04em;
    }
    .mode-toggle-divider {
      width: 1px; height: 24px; background: rgba(255,255,255,0.12);
    }
    #atlas-map { border-radius: 4px; border: 1px solid var(--border); }
    .leaflet-container { background: #111; }
    .map-popup { font-family: var(--mono); font-size: 10px; text-transform: uppercase; }
    .map-popup .leaflet-popup-content-wrapper { background: #111; color: #fff; border-radius: 2px; }
    .map-popup .leaflet-popup-tip { background: #111; }

    /* ---- Grid ---- */
    .grid-section { padding: 24px; overflow: hidden; }
    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 24px;
      list-style: none;
    }
    .card { min-width: 0; overflow: hidden; }

    .card {}
    .card-link { display: block; text-decoration: none; color: inherit; }
    .card-img-wrap {
      position: relative; overflow: hidden;
      background: var(--surface); border-radius: 50%;
    }
    .card-img {
      width: 100%; aspect-ratio: 1; object-fit: cover;
      display: block; transition: opacity 0.2s;
      border-radius: 50%;
    }
    .card-link:hover .card-img { opacity: 0.65; }
    .card-overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      gap: 6px; padding: 15%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border-radius: 50%;
      box-shadow: inset 0 0 40px 10px rgba(255,255,255,0.08);
      opacity: 0; transition: opacity 0.25s ease;
    }
    .card-link:hover .card-overlay { opacity: 1; }
    .card-link:hover .card-img-wrap {
      box-shadow: inset 0 0 60px 20px rgba(255,255,255,0.12);
    }
    .overlay-mode { display: flex; justify-content: center; align-items: center; }
    .overlay-icon { height: 24px; width: auto; object-fit: contain; opacity: 0.9; }
    .overlay-title {
      font-family: var(--sans); font-size: 14px; font-weight: 400;
      color: var(--text); text-align: center; line-height: 1.25;
      max-width: 100%; overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    }
    .overlay-meta {
      font-family: var(--mono); font-size: 9px;
      text-transform: uppercase; color: var(--text-2); text-align: center;
    }
    .mode-icon { height: 12px; width: auto; display: inline-block; vertical-align: middle; object-fit: contain; }

    .card-body { padding: 8px 0 0; }
    .card-code {
      font-family: var(--mono); font-size: 10px;
      color: var(--text-3); text-transform: uppercase;
    }
    .card-title {
      font-family: var(--sans); font-size: 14px; font-weight: 400;
      color: var(--text); line-height: 1.3; margin-top: 2px;
    }
    .card-meta {
      font-family: var(--mono); font-size: 9px;
      color: var(--text-3); text-transform: uppercase;
      margin-top: 4px;
      display: flex; align-items: center; gap: 6px;
    }
    .card-meta-text { white-space: nowrap; }
    .card-meta-text + .card-meta-text::before { content: '·'; margin-right: 6px; }

    /* ---- Submit ---- */
    .submit-section {
      padding: 48px 24px; border-top: 1px solid var(--border);
      text-align: center;
    }
    .submit-label {
      font-family: var(--mono); font-size: 10px;
      text-transform: uppercase; color: var(--text-3);
      margin-bottom: 12px;
    }
    .submit-btn {
      display: inline-block; padding: 10px 24px;
      font-family: var(--mono); font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--text); background: transparent;
      border: 1px solid var(--border); text-decoration: none;
    }
    .submit-btn:hover { border-color: var(--text-3); background: var(--surface); cursor: pointer; }
    .submit-ig { max-width: 560px; margin: 0 auto 16px; }
    .submit-ig-input-wrap { display: flex; gap: 8px; margin-bottom: 12px; }
    .submit-ig-input {
      flex: 1; height: 32px; padding: 0 10px;
      font-family: var(--mono); font-size: 10px;
      color: var(--text); background: rgba(255,255,255,0.06);
      border: 1px solid var(--border); outline: none;
    }
    .submit-ig-input:focus { border-color: rgba(255,255,255,0.3); }
    .submit-ig-btn {
      font-family: var(--mono); font-size: 10px; text-transform: uppercase;
      color: var(--bg); background: var(--text); border: none;
      padding: 0 16px; cursor: pointer; white-space: nowrap;
    }
    .submit-ig-btn:hover { background: var(--text-2); }
    .submit-form { text-align: left; margin-top: 16px; }
    .submit-form-row { display: flex; gap: 16px; margin-bottom: 12px; }
    .submit-thumb { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; flex-shrink: 0; }
    .submit-fields { flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .submit-field { display: flex; flex-direction: column; gap: 2px; }
    .submit-field span {
      font-family: var(--mono); font-size: 9px;
      text-transform: uppercase; color: var(--text-3);
    }
    .submit-field input, .submit-field textarea, .submit-field select {
      font-family: var(--mono); font-size: 10px;
      color: var(--text); background: rgba(255,255,255,0.06);
      border: 1px solid var(--border); padding: 4px 8px; outline: none;
    }
    .submit-field input:focus, .submit-field textarea:focus, .submit-field select:focus {
      border-color: rgba(255,255,255,0.3);
    }
    .submit-field-row { display: flex; gap: 8px; }
    .submit-field-row .submit-field { flex: 1; }
    .submit-or {
      font-family: var(--mono); font-size: 9px;
      color: var(--text-3); text-transform: uppercase; margin: 12px 0;
    }
    .submit-ig-status {
      font-family: var(--mono); font-size: 9px;
      color: var(--text-2); margin-top: 8px;
    }

    /* ---- Footer ---- */
    .footer {
      padding: 16px 24px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
    }
    .footer-text {
      font-family: var(--mono); font-size: 9px;
      text-transform: uppercase; color: var(--text-3);
    }
    .footer-links { display: flex; gap: 12px; }
    .footer-links a {
      font-family: var(--mono); font-size: 9px;
      text-transform: uppercase; color: var(--text-3); text-decoration: none;
    }
    .footer-links a:hover { color: var(--text-2); }

    /* ---- View Toggle ---- */
    .view-toggle {
      display: flex; gap: 2px; align-items: center;
    }
    .view-btn {
      background: none; border: 1px solid var(--border); color: var(--text-3);
      width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; padding: 0; transition: color 0.12s, border-color 0.12s;
    }
    .view-btn:hover { color: var(--text-2); border-color: var(--text-3); }
    .view-btn--active { color: var(--text); border-color: var(--text); }
    .view-btn svg { width: 12px; height: 12px; fill: currentColor; }

    /* ---- List View ---- */
    .grid--list {
      grid-template-columns: 1fr !important;
      gap: 0 !important;
    }
    .grid--list .card { border-bottom: 1px solid var(--border); }
    .grid--list .card-link {
      display: grid;
      grid-template-columns: 48px 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 10px 0;
    }
    .grid--list .card-img-wrap {
      width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
    }
    .grid--list .card-img { border-radius: 50%; }
    .grid--list .card-overlay { display: none; }
    .grid--list .card-body {
      padding: 0; display: flex; align-items: center; gap: 12px;
    }
    .grid--list .card-code { flex-shrink: 0; }
    .grid--list .card-title { margin-top: 0; }
    .grid--list .card-meta {
      margin-top: 0; margin-left: auto; white-space: nowrap;
    }

    .empty { padding: 80px 0; text-align: center; }
    .empty p { font-family: var(--mono); font-size: 10px; color: var(--text-3); }

    /* ---- Responsive ---- */
    @media (max-width: 1024px) {
      .header { height: auto; min-height: 48px; padding: 8px 16px; }
      .header-logo-img { height: 56px; }
      .header-tab { padding: 10px 8px; font-size: 10px; }
      .grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
    }
    @media (max-width: 640px) {
      .header { grid-template-columns: auto 1fr; gap: 6px; padding: 8px 12px; }
      .header-nav { display: none; }
      .header-right { justify-content: flex-end; gap: 6px; }
      .header-left { gap: 6px; }
      .header-logo-img { height: 40px; }
      .header-search { width: 80px; font-size: 9px; height: 26px; padding: 0 6px; }
      .header-cta { font-size: 8px; padding: 4px 8px; }
      .view-btn { width: 24px; height: 24px; }
      .view-btn svg { width: 10px; height: 10px; }
      .grid-section { padding: 12px; }
      .grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
      .card-title { font-size: 11px; }
      .card-meta { font-size: 8px; gap: 4px; }
      .mode-icon { height: 10px; }
      .footer { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a href="/" class="header-logo"><img src="logo.png" alt="Artifice" class="header-logo-img"></a>
    <span class="header-count" id="grid-count" hidden></span>
  </div>
  <nav class="header-nav">
    <a href="#" class="header-tab header-tab--locked">Radar <svg class="lock-icon" viewBox="0 0 16 16"><path d="M8 1a3 3 0 0 0-3 3v2H4a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1h-1V4a3 3 0 0 0-3-3zm-1.5 3a1.5 1.5 0 1 1 3 0v2h-3V4z"/></svg></a>
    <a href="#" class="header-tab header-tab--locked">Profiles <svg class="lock-icon" viewBox="0 0 16 16"><path d="M8 1a3 3 0 0 0-3 3v2H4a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1h-1V4a3 3 0 0 0-3-3zm-1.5 3a1.5 1.5 0 1 1 3 0v2h-3V4z"/></svg></a>
    <a href="#" class="header-tab">Atlas</a>
    <a href="#" class="header-tab header-tab--active">Index</a>
  </nav>
  <div class="header-right">
    <div class="view-toggle">
      <button class="view-btn view-btn--active" id="view-grid" title="Grid view">
        <svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6"/><rect x="9" y="1" width="6" height="6"/><rect x="1" y="9" width="6" height="6"/><rect x="9" y="9" width="6" height="6"/></svg>
      </button>
      <button class="view-btn" id="view-list" title="List view">
        <svg viewBox="0 0 16 16"><rect x="1" y="1" width="14" height="3"/><rect x="1" y="6.5" width="14" height="3"/><rect x="1" y="12" width="14" height="3"/></svg>
      </button>
    </div>
    <input type="search" class="header-search" id="search-input" placeholder="Search..." autocomplete="off">
    <a href="#submit" class="header-cta">Submit</a>
  </div>
</header>

<section class="atlas-map-section" id="atlas-map-section" hidden>
  <div id="atlas-map" style="width:100%;height:400px;"></div>
</section>

<div class="mode-toggle-bar" id="mode-toggle-bar" hidden>
  <button class="mode-toggle-btn mode-toggle-btn--active" data-filter="all">
    <span class="mode-toggle-label">All</span>
  </button>
  <div class="mode-toggle-divider"></div>
  <button class="mode-toggle-btn" data-filter="WHITEBOX">
    <img src="wb-icon.png" alt="WHITEBOX">
  </button>
  <div class="mode-toggle-divider"></div>
  <button class="mode-toggle-btn" data-filter="BLACKBOX">
    <img src="bb-icon.png" alt="BLACKBOX">
  </button>
</div>

<section class="grid-section">
  <ul class="grid" id="artifact-grid"></ul>
  <div class="empty" id="empty-state" hidden><p>No results</p></div>
</section>

<section class="submit-section" id="submit">
  <p class="submit-label">Submit an artifact to the Index</p>
  <div class="submit-ig">
    <div class="submit-ig-input-wrap">
      <input type="url" class="submit-ig-input" id="ig-url" placeholder="Paste Instagram URL..." autocomplete="off">
      <button class="submit-ig-btn" id="ig-fetch">Import</button>
    </div>
    <div class="submit-ig-preview" id="ig-preview" hidden></div>
    <form class="submit-form" id="submit-form" hidden>
      <div class="submit-form-row">
        <img class="submit-thumb" id="submit-thumb" src="" alt="">
        <div class="submit-fields">
          <label class="submit-field"><span>Title</span><input type="text" id="sf-title"></label>
          <label class="submit-field"><span>Description</span><textarea id="sf-desc" rows="2"></textarea></label>
          <label class="submit-field"><span>Authors</span><input type="text" id="sf-authors" readonly></label>
          <div class="submit-field-row">
            <label class="submit-field"><span>Medium</span>
              <select id="sf-medium"><option value="">Select...</option><option>Object</option><option>Spatial</option><option>Digital</option><option>Performance</option><option>Protocol</option><option>Interface</option><option>Documentation</option><option>Environmental</option></select>
            </label>
            <label class="submit-field"><span>Mode</span>
              <select id="sf-mode"><option value="">Select...</option><option>WHITEBOX</option><option>BLACKBOX</option></select>
            </label>
            <label class="submit-field"><span>Entity</span>
              <select id="sf-entity"><option value="">Select...</option><option>Studio Artifice</option><option>Artifice NYC</option></select>
            </label>
          </div>
          <label class="submit-field"><span>Tags</span><input type="text" id="sf-tags" placeholder="comma-separated"></label>
        </div>
      </div>
      <button type="submit" class="submit-btn">Add to Index</button>
    </form>
    <div class="submit-ig-status" id="ig-status"></div>
  </div>
  <p class="submit-or">or</p>
  <a href="mailto:info@artificenyc.org?subject=Artifact%20Submission" class="submit-btn">Email Submission</a>
</section>

<footer class="footer">
  <span class="footer-text">Studio Artifice LLC &middot; Artifice NYC &middot; 2024&ndash;Ongoing</span>
  <div class="footer-links">
    <a href="https://es.artificenyc.org">Ecosystem</a>
    <a href="https://www.instagram.com/artifice.nyc/" target="_blank" rel="noopener">Instagram</a>
    <a href="mailto:info@artificenyc.org">Email</a>
  </div>
</footer>

<script src="app.js"></script>
</body>
</html>
